name: Unzip duckdz.zip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Extract duckdz.zip
        run: |
          mkdir -p extracted
          if [ -f "duckdz.zip" ]; then
            unzip -o duckdz.zip -d extracted/
            echo "✅ Extracted successfully!"
            ls -la extracted/
          else
            echo "❌ File duckdz.zip not found!"
            ls -la *.zip 2>/dev/null || echo "No zip files found"
            exit 1
          fi

      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: duckdz-extracted
          path: extracted/
          compression-level: 0
          overwrite: true
