name: Unzip and Upload

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get install -y unzip

      - name: Create output directory
        run: mkdir -p extracted

      - name: Unzip file
        run: |
          if [ -f "duckdz_monite_ui.zip" ]; then
            unzip -o duckdz_monite_ui.zip -d extracted/
          else
            echo "File duckdz_monite_ui.zip not found!"
            exit 1
          fi

      - name: List extracted files
        run: ls -la extracted/

      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: extracted-files
          path: extracted/
          compression-level: 0
          overwrite: true
