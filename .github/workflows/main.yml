name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
      
      - name: Setup iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          # Tải SDK 16.5
          curl -L -o iPhoneOS16.5.sdk.zip https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS16.5.sdk.zip
          unzip -q iPhoneOS16.5.sdk.zip
          # Tạo symlink cho SDK 13.0 (phòng trường hợp)
          ln -sf iPhoneOS16.5.sdk iPhoneOS13.0.sdk
      
      - name: Build tweak
        run: |
          cd ol
          make package
      
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit.deb
          path: ol/packages/*.deb
