name: Unzip and Upload

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install 7zip
        run: sudo apt-get install -y p7zip-full

      - name: Rename file (remove spaces)
        run: |
          if [ -f "duckdz monite ui.zip" ]; then
            mv "duckdz monite ui.zip" duckdz_monite_ui.zip
            echo "✅ Renamed file"
          elif [ -f "duckdz_monite_ui.zip" ]; then
            echo "✅ File already has correct name"
          else
            echo "❌ File not found!"
            ls -la *.zip 2>/dev/null || echo "No zip files found"
            exit 1
          fi

      - name: Extract with 7zip
        run: |
          mkdir -p extracted
          7z x duckdz_monite_ui.zip -oextracted/ -y
          echo "✅ Extracted files:"
          ls -la extracted/

      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: extracted-files
          path: extracted/
          compression-level: 0
          overwrite: true
