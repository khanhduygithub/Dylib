
name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
      
      - name: Create Makefile
        run: |
          cat > Makefile << 'MAKEFILE'
export THEOS = $(HOME)/theos
export THEOS_MAKE_PATH = $(THEOS)/makefiles
export SDKVERSION = 16.5
export IPHONEOS_DEPLOYMENT_TARGET = 13.0
export TARGET = iphone:clang:16.5:13.0

ARCHS = arm64
DEBUG = 0
FINALPACKAGE = 1
FOR_RELEASE = 1
THEOS_PACKAGE_SCHEME = rootless

include $(THEOS_MAKE_PATH)/common.mk

TWEAK_NAME = 34306jit

$(TWEAK_NAME)_CCFLAGS = -std=c++17 -fobjc-arc -Wno-deprecated -Wno-error -Wno-unused-variable
$(TWEAK_NAME)_CFLAGS = -fobjc-arc -Wno-deprecated -Wno-error

$(TWEAK_NAME)_FRAMEWORKS = UIKit Foundation Metal MetalKit QuartzCore CoreGraphics Security

$(TWEAK_NAME)_FILES = ImGuiDrawView.mm \
                      oxorany/oxorany.cpp \
                      $(wildcard Esp/*.mm) \
                      $(wildcard Esp/*.m) \
                      $(wildcard IMGUI/*.cpp) \
                      $(wildcard IMGUI/*.mm)

$(TWEAK_NAME)_CFLAGS += -I. -I./Helper -I./IMGUI -I./Esp -I./Hosts -I./oxorany

include $(THEOS_MAKE_PATH)/tweak.mk
MAKEFILE
      
      - name: Build tweak
        run: |
          make clean package
      
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit.deb
          path: packages/*.deb
E
