name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
      
      - name: Setup iOS SDK (use system SDK)
        run: |
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          # Dùng SDK có sẵn từ Xcode trên máy macOS
          ln -sf /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk iPhoneOS16.5.sdk
          ln -sf iPhoneOS16.5.sdk iPhoneOS13.0.sdk
          ls -la
      
      - name: Build tweak
        run: |
          cd ol
          make package
      
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit.deb
          path: ol/packages/*.deb
