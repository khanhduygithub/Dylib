name: Extract duckdz.zip

on:
  push:
    paths:
      - 'duckdz.zip'
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract ZIP file
        run: |
          if [ -f "duckdz.zip" ]; then
            echo "📦 Đang giải nén duckdz.zip..."
            unzip -o duckdz.zip -d extracted_content
            echo "✅ Giải nén thành công!"
            echo "📂 Nội dung đã giải nén:"
            ls -la extracted_content/
          else
            echo "❌ Không tìm thấy file duckdz.zip"
            exit 1
          fi
      
      - name: Upload extracted content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdz-extracted
          path: extracted_content/
          retention-days: 90
      
      - name: Commit extracted files (optional)
        run: |
          if [ -d "extracted_content" ] && [ "$(ls -A extracted_content)" ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # Di chuyển file đã giải nén vào thư mục mong muốn
            mkdir -p duckdz_files
            cp -r extracted_content/* duckdz_files/
            
            git add duckdz_files/
            git commit -m "🤖 Auto-extract duckdz.zip" || echo "Không có thay đổi để commit"
            git push || echo "Không thể push (có thể do branch protection)"
          fi
        continue-on-error: true
